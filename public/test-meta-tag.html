<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="wkxFBgTwEZhp_gfBVL0jpbPir7ge1pk8TX4ExD9bZTI" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tag Test - AIChatWindow</title>
</head>
<body>
    <h1>Google Verification Meta Tag Test</h1>
    <p>This page tests if the Google verification meta tag is working.</p>
    <p><strong>Expected meta tag:</strong></p>
    <code>&lt;meta name="google-site-verification" content="wkxFBgTwEZhp_gfBVL0jpbPir7ge1pk8TX4ExD9bZTI" /&gt;</code>
    
    <script>
        // Check if meta tag exists
        const metaTag = document.querySelector('meta[name="google-site-verification"]');
        if (metaTag) {
            console.log('✅ Google verification meta tag found:', metaTag.content);
            document.body.innerHTML += '<p style="color: green; font-weight: bold;">✅ Meta tag found in DOM with content: ' + metaTag.content + '</p>';
        } else {
            console.log('❌ Google verification meta tag NOT found');
            document.body.innerHTML += '<p style="color: red; font-weight: bold;">❌ Meta tag NOT found in DOM</p>';
        }
    </script>
</body>
</html>
